<div
  class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-gradient-to-br from-teal-800 via-teal-900 to-amber-900 text-white p-10 flex-col justify-between"
>
  <div
    class="pointer-events-none absolute inset-0 opacity-20"
    style="background-image: radial-gradient(circle at 20% 20%, white 1px, transparent 1px), radial-gradient(circle at 80% 60%, white 1px, transparent 1px); background-size: 60px 60px;"
    aria-hidden="true"
  ></div>

  <a routerLink="/" class="relative font-bold text-xl tracking-tight">🧭 WanderLore</a>

  <div class="relative">
    <p class="text-2xl font-semibold leading-snug mb-8 max-w-sm">
      "Every destination has a story most travelers never hear. Let's find yours."
    </p>

    <ul class="flex flex-col gap-4">
      @for (h of highlights; track h.text) {
        <li class="flex items-start gap-3 text-teal-50">
          <span class="text-xl" aria-hidden="true">{{ h.icon }}</span>
          <span class="text-sm leading-relaxed">{{ h.text }}</span>
        </li>
      }
    </ul>
  </div>

  <p class="relative text-xs text-teal-200">Built for hack2Skill PromptWars</p>
</div>
