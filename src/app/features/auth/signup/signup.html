<main class="min-h-screen flex bg-white">
  <app-auth-panel />

  <div class="flex-1 flex items-center justify-center px-4 sm:px-6 py-10">
    <div class="w-full max-w-sm">
      <a routerLink="/" class="lg:hidden inline-block font-bold text-lg text-teal-900 mb-8">
        🧭 Wanderland
      </a>

      <h1 class="text-2xl font-bold text-teal-900 mb-1">Start exploring</h1>
      <p class="text-sm text-gray-500 mb-6">Create an account to save your discoveries.</p>

      <button
        type="button"
        (click)="continueWithGoogle()"
        [disabled]="googleSubmitting()"
        class="w-full flex items-center justify-center gap-2 rounded-lg border border-gray-300 py-2.5 font-medium text-gray-700 hover:bg-gray-50 disabled:opacity-50 transition-colors mb-5"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.56 2.7-3.87 2.7-6.62Z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.55-1.85.87-3.06.87-2.35 0-4.34-1.59-5.05-3.72H.96v2.33A9 9 0 0 0 9 18Z"/>
          <path fill="#FBBC05" d="M3.95 10.71a5.4 5.4 0 0 1 0-3.42V4.96H.96a9 9 0 0 0 0 8.08l2.99-2.33Z"/>
          <path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .96 4.96l2.99 2.33C4.66 5.17 6.65 3.58 9 3.58Z"/>
        </svg>
        {{ googleSubmitting() ? 'Redirecting…' : 'Continue with Google' }}
      </button>

      <div class="flex items-center gap-3 mb-5">
        <div class="h-px bg-gray-200 flex-1"></div>
        <span class="text-xs text-gray-400">or</span>
        <div class="h-px bg-gray-200 flex-1"></div>
      </div>

      <form (ngSubmit)="submit()" class="flex flex-col gap-4" novalidate>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            required
            minlength="6"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
          />
          <p class="text-xs text-gray-400 mt-1">At least 6 characters.</p>
        </div>

        @if (error()) {
          <p role="alert" class="text-sm text-red-600">{{ error() }}</p>
        }

        <button
          type="submit"
          [disabled]="submitting()"
          class="mt-2 rounded-lg bg-teal-700 text-white font-medium py-2 hover:bg-teal-800 disabled:opacity-50 transition-colors"
        >
          {{ submitting() ? 'Creating account…' : 'Create account' }}
        </button>
      </form>

      <p class="text-xs text-gray-400 mt-4 text-center">
        We'll email you a confirmation link to activate your account.
      </p>

      <p class="text-sm text-gray-500 mt-4 text-center">
        Already have an account?
        <a routerLink="/login" class="text-teal-700 font-medium hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</main>
