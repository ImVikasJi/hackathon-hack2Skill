<main class="min-h-screen flex bg-white">
  <app-auth-panel />

  <div class="flex-1 flex items-center justify-center px-4 sm:px-6 py-10">
    <div class="w-full max-w-sm text-center">
      <a routerLink="/" class="lg:hidden inline-block font-bold text-lg text-teal-900 mb-8">
        🧭 WanderLore
      </a>

      <div class="text-5xl mb-4" aria-hidden="true">📬</div>

      <h1 class="text-2xl font-bold text-teal-900 mb-2">Check your inbox</h1>
      <p class="text-sm text-gray-500 mb-1">
        We've sent a confirmation link to
      </p>
      <p class="text-sm font-medium text-gray-800 mb-6">
        {{ email() || 'your email address' }}
      </p>
      <p class="text-sm text-gray-500 mb-6">
        Click the link in that email to activate your account and start exploring.
      </p>

      @if (error()) {
        <p role="alert" class="text-sm text-red-600 mb-4">{{ error() }}</p>
      }

      <p class="text-sm text-gray-500">
        Didn't get it?
        <button
          type="button"
          (click)="resend()"
          [disabled]="resendState() === 'sending'"
          class="text-teal-700 font-medium hover:underline disabled:opacity-50"
        >
          @switch (resendState()) {
            @case ('sending') { Sending… }
            @case ('sent') { Sent — check your inbox }
            @default { Resend confirmation email }
          }
        </button>
      </p>

      <p class="text-sm text-gray-500 mt-6">
        Already confirmed?
        <a routerLink="/login" class="text-teal-700 font-medium hover:underline">Sign in</a>
      </p>
    </div>
  </div>
</main>
